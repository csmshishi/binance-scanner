name: Binance EMA Scanner

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - run: python scan_ema.py
      - uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: results.json
